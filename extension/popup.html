<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RavenLoom Import</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 360px;
      padding: 16px;
      background: #1a1a2e;
      color: #e8e8e8;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a4a;
    }

    .header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .status.connected {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .status.disconnected {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .status.detecting {
      background: rgba(99, 102, 241, 0.15);
      color: #6366f1;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #b0b0b0;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6366f1;
    }

    select {
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background: #6366f1;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5558e3;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #2a2a4a;
      color: #e8e8e8;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #3a3a5a;
    }

    .preview {
      background: #12122a;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .preview-title {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .preview-item {
      font-size: 13px;
      color: #b0b0b0;
      padding: 4px 0;
      border-bottom: 1px solid #2a2a4a;
    }

    .preview-item:last-child {
      border-bottom: none;
    }

    .success {
      text-align: center;
      padding: 20px;
    }

    .success-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .success h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .success p {
      font-size: 14px;
      color: #888;
    }

    .error {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .settings-link {
      text-align: center;
      margin-top: 12px;
    }

    .settings-link a {
      color: #6366f1;
      text-decoration: none;
      font-size: 13px;
    }

    .settings-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="width: 32px; height: 32px; background: #6366f1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px;">R</div>
    <h1>RavenLoom Import</h1>
  </div>

  <!-- Settings View -->
  <div id="settings-view" class="hidden">
    <div class="section">
      <div class="section-title">Configuration</div>
      <label for="server-url">RavenLoom Server URL</label>
      <input type="url" id="server-url" placeholder="https://your-ravenloom.com">

      <label for="api-key">API Key (optional)</label>
      <input type="password" id="api-key" placeholder="Your API key">

      <button class="btn btn-primary" id="save-settings">Save Settings</button>
      <button class="btn btn-secondary" id="back-to-main">Back</button>
    </div>
  </div>

  <!-- Main View -->
  <div id="main-view">
    <div id="connection-status" class="status detecting">
      Checking connection...
    </div>

    <div id="error-message" class="error hidden"></div>

    <!-- Page Detection -->
    <div id="detection-section" class="section">
      <div class="section-title">Current Page</div>
      <div id="page-info" class="status detecting">
        Detecting conversation...
      </div>
    </div>

    <!-- Team Selection -->
    <div id="team-section" class="section hidden">
      <div class="section-title">Import To</div>
      <label for="team-select">Team</label>
      <select id="team-select">
        <option value="">Loading teams...</option>
      </select>
    </div>

    <!-- Preview -->
    <div id="preview-section" class="section hidden">
      <div class="section-title">Preview</div>
      <div class="preview">
        <div class="preview-title" id="preview-title"></div>
        <div id="preview-messages"></div>
      </div>
    </div>

    <!-- Import Button -->
    <button id="import-btn" class="btn btn-primary hidden" disabled>
      Import Conversation
    </button>

    <!-- Success View -->
    <div id="success-section" class="success hidden">
      <div class="success-icon">:white_check_mark:</div>
      <h2>Import Complete!</h2>
      <p id="success-message"></p>
      <button class="btn btn-secondary" id="view-in-app">View in RavenLoom</button>
    </div>

    <div class="settings-link">
      <a href="#" id="open-settings">Settings</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
